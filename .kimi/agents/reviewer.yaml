version: 1
agent:
  name: litemark-code-reviewer
  extend: default
  system_prompt_path: ./reviewer-system.md
  # CI/本地审查场景是只读的，排除写入工具更安全
  exclude_tools:
    - "kimi_cli.tools.file:WriteFile"
    - "kimi_cli.tools.file:StrReplaceFile"
    - "kimi_cli.tools.plan:EnterPlanMode"
    - "kimi_cli.tools.plan:ExitPlanMode"
